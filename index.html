<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="theme-color" content="#0b0f1a">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voidpx | Pixel Collection</title>
    <meta name="description" content="Voidpx pixel art collection and creative experiments."/>
    <meta property="og:title" content="Voidpx | Pixel Collection">
    <meta property="og:description" content="Voidpx pixel art collection and creative experiments.">
    <meta property="og:image" content="https://voidpx.com/assets/image/og.jpg">
    <link rel="icon" type="image/x-icon" href="assets/image/favicon.ico" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  </head>

  <body>
    <main class="frame">
      <header class="navbar">
        <div class="nav__left">
          <h1 class="navbar__title">VOIDPX</h1>
        </div>

        <div class="nav__center">
          <form id="search" class="search__box">
            <input
              id="searchInput"
              type="text"
              placeholder="Search by title..."
              autocomplete="off"
            />
            <button type="submit" id="searchBtn" class="search__button" aria-label="Search Collection">
              <i class="bi bi-search" aria-hidden="true"></i>
              <span>Search</span>
            </button>
          </form>
        </div>

        <div class="nav__right">
          <button id="categoryToggle" class="category__toggle" data-category="ALL" type="button" aria-label="Toggle category filter">
            <i class="bi bi-grid-3x3-gap-fill" aria-hidden="true"></i>
            <span>ALL</span>
          </button>
          <button id="favoritesBtn" class="favorites__btn" type="button" aria-label="View favorites">
            <i class="bi bi-heart" aria-hidden="true"></i>
          </button>
          <button id="themeToggle" class="theme__toggle" data-theme="dark" type="button" aria-label="Toggle theme">
            <i class="bi bi-moon-stars-fill" aria-hidden="true"></i>
            <span>DARK</span>
          </button>
        </div>
      </header>

      <section class="content__collections">
        <div class="content__box"></div>
        <p id="emptyState" role="status" class="empty-state is-hidden">No results found</p>
      </section>

      <section class="gallery-panel">
        <div class="pagination">
          <button id="prevBtn" class="page__btn" aria-label="Previous page" disabled>
            <i class="bi bi-chevron-left" aria-hidden="true"></i>
            <span>PREV</span>
          </button>
          <span id="pageNumber">1 / 1</span>
          <button id="nextBtn" class="page__btn" aria-label="Next page">
            <span>NEXT</span>
            <i class="bi bi-chevron-right" aria-hidden="true"></i>
          </button>
        </div>
        <div class="gallery-info">
          <span id="imageCount" class="image__count"></span>
        </div>
      </section>

      <!-- Preview Modal -->
      <section id="previewModal" class="preview-modal" aria-hidden="true" inert>
        <div class="preview-modal__overlay"></div>
        <div class="preview-modal__container">
          <button id="prevPreview" class="preview-modal__nav prev" aria-label="Previous image">
            <i class="bi bi-chevron-left"></i>
          </button>
          
          <button id="previewClose" class="preview-modal__close" type="button" aria-label="Close preview">
            <i class="bi bi-x-lg"></i>
          </button>
          
          <div class="preview-modal__image">
            <img id="previewImage" src="" alt="Preview image"/>
          </div>
          
          <button id="nextPreview" class="preview-modal__nav next" aria-label="Next image">
            <i class="bi bi-chevron-right"></i>
          </button>

          <div class="preview-modal__meta">
            <h2 id="previewTitle" class="preview-modal__title"></h2>
            <span id="previewCategory" class="preview-modal__category"></span>
          </div>
        </div>
      </section>

      <section class="toast-panel" aria-live="polite" aria-atomic="true">
        <div id="copyToast" class="copy-toast" role="status"></div>
      </section>

      <footer class="footer">
        <div class="footer__logo">
          <a href="https://github.com/mammaddrik" target="_blank" rel="noopener noreferrer" aria-label="Mammad GitHub">
            <i class="bi bi-github" aria-hidden="true"></i>
          </a>
          <a href="https://www.linkedin.com/in/mammaddrik/" target="_blank" rel="noopener noreferrer" aria-label="Mammad LinkedIn">
            <i class="bi bi-linkedin" aria-hidden="true"></i>
          </a>
        </div>
        <p class="footer__copyright">© 2026 VOIDPX - ALL RIGHTS RESERVED</p>
        <div class="footer__logo">
          <a href="https://github.com/hamid-adler" target="_blank" rel="noopener noreferrer" aria-label="Hamid GitHub">
            <i class="bi bi-github" aria-hidden="true"></i>
          </a>
          <a href="https://www.linkedin.com/in/hamid-adler" target="_blank" rel="noopener noreferrer" aria-label="Hamid LinkedIn">
            <i class="bi bi-linkedin" aria-hidden="true"></i>
          </a>
        </div>
      </footer>

      </main>
    <script src="script.js" defer></script>
  </body>
</html>
