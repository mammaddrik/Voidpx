<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voidpx | Pixel Collection</title>
    <meta name="description" content="Voidpx pixel art collection and creative experiments."/>
    <link rel="icon" type="image/x-icon" href="assets/image/favicon.ico" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  </head>

  <body>
    <main class="frame">
      <header class="navbar">

        <div class="nav__left">
          <h1 class="navbar__title">VOIDPX</h1>
        </div>

        <div class="nav__center">
          <form id="search" class="search__box">
            <input
              id="searchInput"
              type="text"
              placeholder="Search by title..."
            />
            <button type="button" id="searchBtn" class="search__button">
              <i class="bi bi-search"></i>
              <span>Search</span>
            </button>
          </form>
        </div>

        <div class="nav__right">
          <button id="categoryToggle" class="category__toggle" type="button">
            <i class="bi bi-grid-3x3-gap-fill"></i>
            <span>ALL</span>
          </button>
          <button id="themeToggle" class="theme__toggle" type="button">
            <i class="bi bi-moon-stars-fill"></i>
            <span>DARK</span>
          </button>
        </div>
      </header>

      <section class="content__collections">
        <div class="content__box"></div>
        <p id="emptyState" class="empty-state is-hidden">No results found</p>
      </section>

      <section class="gallery-panel">
        <div class="pagination">
          <button id="prevBtn" class="page__btn" disabled>
            <i class="bi bi-chevron-left"></i>
            <span>PREV</span>
          </button>
          <span id="pageNumber">1 / 1</span>
          <button id="nextBtn" class="page__btn">
            <span>NEXT</span>
            <i class="bi bi-chevron-right"></i>
          </button>
        </div>
        <div class="gallery-info">
          <span id="imageCount" class="image__count"></span>
        </div>
      </section>

      <footer class="footer">
        <div class="footer__logo">
          <a href="https://github.com/mammaddrik" target="_blank" rel="noopener noreferrer">
            <i class="bi bi-github"></i>
          </a>
          <a href="https://www.linkedin.com/in/mammaddrik/" target="_blank" rel="noopener noreferrer">
            <i class="bi bi-linkedin"></i>
          </a>
        </div>
        <p>© 2026 VOIDPX - ALL RIGHTS RESERVED</p>
        <div class="footer__logo">
          <a href="https://github.com/hamid-adler" target="_blank" rel="noopener noreferrer">
            <i class="bi bi-github"></i>
          </a>
          <a href="https://www.linkedin.com/in/hamid-adler" target="_blank" rel="noopener noreferrer">
            <i class="bi bi-linkedin"></i>
          </a>
        </div>
      </footer>
    </main>
    <script src="script.js" defer></script>
  </body>
</html>
